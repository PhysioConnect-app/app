name: clinic_telehealth_app
description: A physical therapy clinic management and telehealth app.
publish_to: 'none'
version: 1.0.0+6
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Supabase
  supabase_flutter: ^2.8.4
  # Firebase (FCM push notifications on Android)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  http: ^1.2.2
  # Media
  image_picker: ^1.1.2
  # Location & Maps
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # State management & persistence
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  # UI & utilities
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.1
  url_launcher: ^6.3.1
  pdf: ^3.10.7
  printing: ^5.11.1
  excel: ^4.0.6
  archive: ^3.6.1
  file_picker: ^8.1.2
  share_plus: ^10.0.0
  path_provider: ^2.1.3
  web: ^1.1.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.7

msix_config:
  display_name: PhysioConnect
  publisher_display_name: PhysioConnect
  identity_name: PhysioConnect.PhysioConnect
  publisher: CN=83E191CA-6DED-4CE1-AAB4-C15B5CBAD17F
  msix_version: 1.0.7.0
  logo_path: assets\icon\icon_256.png
  # Sideloading: flutter pub run msix:create --certificate-path certs\physioconnect_store.pfx --certificate-password $MSIX_CERTIFICATE_PASSWORD
  # Store upload: flutter pub run msix:create --store   (Partner Center signs — no local cert needed)
  install_certificate: false
  architecture: x64
  capabilities: internetClient,location
  languages: en-us,ar-sa
  output_path: build\msix
  output_name: PhysioConnect_Setup

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/exercises/
    - assets/exercises/images/
